<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Deltacar Autoservis</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the full path into the query string and redirects to index.html
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl =
        window.location.origin +
        "/?p=" +
        encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
